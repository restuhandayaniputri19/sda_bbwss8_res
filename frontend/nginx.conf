server {
    listen 80;
    root /usr/share/nginx/html;
    
    location /balai/bbwssumatera8/ {
        try_files $uri $uri/ /balai/bbwssumatera8/index.html;
    }

    # Jika ada yang akses root domain, lempar ke sub-folder balai
    location / {
        try_files $uri $uri/ /balai/bbwssumatera8/index.html;
    }

    error_page 502 503 504 /custom_50x.html;

    location = /custom_50x.html {
        root /usr/share/nginx/html; # Ini merujuk ke folder di dalam kontainer
        internal;
    }
}
